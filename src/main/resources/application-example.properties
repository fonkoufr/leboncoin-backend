spring.application.name=leboncoin-api

# --- CONNEXION ORACLE CLOUD (WALLET) ---
# Copier ce fichier en 'application.properties' et remplir les valeurs réelles
# Ne jamais commiter application.properties !

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:oracle:thin:@<service_name>?TNS_ADMIN=<chemin_wallet>}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# --- CONFIGURATION JPA ---
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# --- SWAGGER/SPRINGDOC ---
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
